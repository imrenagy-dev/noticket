<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      /* Perforation line adapts to OS dark/light — ticket gradient is always vivid */
      .prf { stroke: white; stroke-opacity: .45 }
      @media (prefers-color-scheme: light) {
        .prf { stroke: #1E1B4B; stroke-opacity: .28 }
      }
    </style>

    <!-- Ticket gradient: indigo → violet → rose -->
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="62%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>

    <!--
      Ticket mask — full-bleed rect (30×26) with two semicircle notches.
      Ticket : x=1  y=3  w=30  h=26   →  (1,3)–(31,29)
      Divider: x=23   main body 22px | stub 8px
      Notch r: 5 px
    -->
    <mask id="tm">
      <rect x="1" y="3" width="30" height="26" rx="3.5" fill="white"/>
      <circle cx="23" cy="3"  r="5" fill="black"/>
      <circle cx="23" cy="29" r="5" fill="black"/>
    </mask>
  </defs>

  <!-- Ticket body — fills nearly the whole canvas -->
  <rect x="1" y="3" width="30" height="26" rx="3.5" fill="url(#tg)" mask="url(#tm)"/>

  <!-- Subtle top-gloss inside the ticket -->
  <rect x="1" y="3" width="30" height="13" rx="3.5" fill="white" fill-opacity=".08" mask="url(#tm)"/>

  <!-- Perforated stub divider -->
  <line class="prf" x1="23" y1="8" x2="23" y2="24"
        stroke-width="1" stroke-dasharray="2,1.5" stroke-linecap="round"/>
</svg>
